<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Join my BuzzBuzz Hive</title>
  <meta name="description" content="Open your BuzzBuzz invite or install the app." />
  <link rel="icon" href="./app-icon.png" />
  <style>
    :root {
      --bg: #fff8e7;
      --text: #2c2418;
      --muted: #6b5a48;
      --card: #ffffff;
      --border: #e8dcc6;
      --open-bg: #e8a317;
      --open-text: #2c2418;
      --store-bg: #2c2418;
      --store-text: #ffffff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 18px 40px;
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(61, 46, 34, 0.06);
    }

    .app-icon {
      width: 76px;
      height: 76px;
      border-radius: 18px;
      margin: 0 auto 12px;
      display: block;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      object-fit: cover;
      background: #fff;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
    }

    p { margin: 8px 0; line-height: 1.45; }
    .muted { color: var(--muted); font-size: 14px; }

    .btn {
      display: inline-block;
      width: 100%;
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.08s ease, opacity 0.12s ease;
    }

    .btn:active { transform: scale(0.995); }

    .btn-open { background: var(--open-bg); color: var(--open-text); }
    .btn-store { background: var(--store-bg); color: var(--store-text); }

    .small {
      margin-top: 14px;
      font-size: 12px;
      color: #8b7b6b;
      word-break: break-all;
      display: none; /* set to block while debugging */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img src="./app-icon.png" alt="BuzzBuzz app icon" class="app-icon" />

      <h1>Join my BuzzBuzz Hive</h1>
      <p id="fromText">Opening your invite…</p>
      <p class="muted">If BuzzBuzz is installed, it should open automatically.</p>

      <a id="openBtn" class="btn btn-open" href="#">Open BuzzBuzz</a>
      <a id="storeBtn" class="btn btn-store" href="https://apps.apple.com/app/id6767195595">Get BuzzBuzz on the App Store</a>

      <p class="muted" style="margin-top:10px;">
          First time installing BuzzBuzz? After install, return to your message and tap this invite link again to join the correct hive.
      </p>

      <p class="small" id="debug"></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hiveId = params.get("hiveId") || "";
    const from = params.get("from") || "";
    const inviteId = params.get("inviteId") || "";

    const deepLink =
      `buzzbuzz://community/friend/new?hiveId=${encodeURIComponent(hiveId)}` +
      `&from=${encodeURIComponent(from)}` +
      `&inviteId=${encodeURIComponent(inviteId)}`;

    const fromText = document.getElementById("fromText");
    if (from) {
      fromText.textContent = `@${from} invited you to join their hive.`;
    } else {
      fromText.textContent = "You were invited to join a BuzzBuzz hive.";
    }

    document.getElementById("openBtn").href = deepLink;
    document.getElementById("debug").textContent = deepLink;

    const storeUrl = "https://apps.apple.com/app/id6767195595";
    let didHide = false;

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) didHide = true;
    });

    // Try to open app first.
    setTimeout(() => {
      window.location.href = deepLink;
    }, 120);

    // Fallback to App Store if app did not open.
    setTimeout(() => {
      if (!didHide) window.location.href = storeUrl;
    }, 1800);
  </script>
</body>
</html>
