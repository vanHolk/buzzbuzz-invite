<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Join my BuzzBuzz Hive</title>
  <meta name="description" content="Open BuzzBuzz invite or install the app." />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background:#fff8e7; color:#2c2418; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px 40px; text-align:center; }
    .card { background:#fff; border:1px solid #e8dcc6; border-radius:14px; padding:20px; box-shadow:0 4px 14px rgba(61,46,34,0.06); }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 8px 0; line-height: 1.45; }
    .muted { color:#6b5a48; font-size:14px; }
    .btn { display:inline-block; width:100%; box-sizing:border-box; margin-top:12px; padding:14px 16px; border-radius:12px; text-decoration:none; font-weight:700; }
    .btn-open { background:#e8a317; color:#2c2418; }
    .btn-store { background:#2c2418; color:#fff; }
    .small { margin-top:14px; font-size:12px; color:#8b7b6b; word-break:break-all; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Join my BuzzBuzz Hive</h1>
      <p id="fromText">Opening your invite…</p>
      <p class="muted">If BuzzBuzz is installed, it should open automatically.</p>

      <a id="openBtn" class="btn btn-open" href="#">Open BuzzBuzz</a>
      <a id="storeBtn" class="btn btn-store" href="https://apps.apple.com/app/id6767195595">Get BuzzBuzz on App Store</a>

      <p class="small" id="debug"></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hiveId = params.get("hiveId") || "";
    const from = params.get("from") || "";
    const inviteId = params.get("inviteId") || "";

    const deepLink = `buzzbuzz://community/friend/new?hiveId=${encodeURIComponent(hiveId)}&from=${encodeURIComponent(from)}&inviteId=${encodeURIComponent(inviteId)}`;

    const fromText = document.getElementById("fromText");
    if (from) fromText.textContent = `@${from} invited you to join their hive.`;
    else fromText.textContent = "You were invited to join a BuzzBuzz hive.";

    document.getElementById("openBtn").href = deepLink;
    document.getElementById("debug").textContent = deepLink;

    // Try open app, then fall back to App Store.
    const storeUrl = "https://apps.apple.com/app/id6767195595";
    let didHide = false;
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) didHide = true;
    });

    setTimeout(() => {
      window.location.href = deepLink;
    }, 120);

    setTimeout(() => {
      if (!didHide) window.location.href = storeUrl;
    }, 1800);
  </script>
</body>
</html>
